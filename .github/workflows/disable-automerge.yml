name: Active Auto-Merge Disabler

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'core/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  disable-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Disable Auto-Merge and Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python .github/scripts/disable_automerge.py
