name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  STRICT_MODE: "true"

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Checksum Duplication Guard
      run: ./scripts/check_duplicates.sh

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: clinica
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clinica"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
    - name: Run tests (core, web, modern)
      run: mvn -B test -pl core,web,modern -Ddb.test=localhost

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Cache NVD database
      uses: actions/cache@v4
      with:
        path: target/dependency-check-data
        key: ${{ runner.os }}-nvd-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-nvd-
    - name: Run dependency scan
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: mvn -B verify -Pdependency-scan -DskipTests

  verification:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: clinica
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clinica"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run Validation and Verification Phase
      run: mvn -B clean verify -Ddb.test=localhost
    - name: Upload JaCoCo HTML Reports
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-reports
        path: |
          **/target/site/jacoco/**
          **/target/site/jacoco-aggregate/**
        retention-days: 14
    - name: Upload PMD Warning Reports
      uses: actions/upload-artifact@v4
      with:
        name: pmd-reports
        path: |
          **/target/pmd.xml
          **/target/site/pmd.html
        retention-days: 14

