name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: clinica
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clinica"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
    - name: Frontend Quality Gates
      run: |
        npm install
        npm --prefix web run lint
        npm --prefix web run format:check
        npm --prefix modern run lint
        npm --prefix modern run format:check
        npm --prefix visual-tests run lint
        npm --prefix visual-tests run format:check
    - name: Run tests (core, web, modern)
      run: mvn -B test -pl core,web,modern -Ddb.test=localhost
