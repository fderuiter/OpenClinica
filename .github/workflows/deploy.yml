name: Continuous Deployment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      bypass_validation:
        description: 'Bypass validation checks (emergency hotfix only)'
        required: false
        type: boolean
        default: false

permissions: read-all

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check validation outcome and output link
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Validation Run: ${{ github.event.workflow_run.html_url }}" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Validation workflow failed!"
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual execution triggered. Bypass validation: ${{ github.event.inputs.bypass_validation }}" >> $GITHUB_STEP_SUMMARY
          fi

  build-and-publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-web:latest
            ghcr.io/${{ github.repository_owner }}/app-web:${{ env.DEPLOY_SHA }}

      - name: Build and Push Modern Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.modern
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-modern:latest
            ghcr.io/${{ github.repository_owner }}/app-modern:${{ env.DEPLOY_SHA }}

  validate:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published images
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/app-web:${{ env.DEPLOY_SHA }}
          docker pull ghcr.io/${{ github.repository_owner }}/app-modern:${{ env.DEPLOY_SHA }}
          docker tag ghcr.io/${{ github.repository_owner }}/app-web:${{ env.DEPLOY_SHA }} app-web:latest
          docker tag ghcr.io/${{ github.repository_owner }}/app-modern:${{ env.DEPLOY_SHA }} app-modern:latest

      - name: Setup environment
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=localhost/DB_HOST=db/' .env
          sed -i 's/HOST_CLINICAL_TEMPLATE_PATH=dummy_template.xlsx/HOST_CLINICAL_TEMPLATE_PATH=.\/dummy_template.xlsx/' .env

      - name: Start isolated application instance
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting up to 180 seconds for application initialization..."
          for i in {1..36}; do
              ALL_HEALTHY=true
              CONTAINERS=$(docker compose ps -q web modern)
              if [ -z "$CONTAINERS" ]; then
                  ALL_HEALTHY=false
              else
                  for container_id in $CONTAINERS; do
                      status=$(docker inspect --format='{{.State.Health.Status}}' "$container_id" 2>/dev/null)
                      if [ "$status" != "healthy" ]; then
                          ALL_HEALTHY=false
                          break
                      fi
                  done
              fi
              if [ "$ALL_HEALTHY" = true ]; then
                  echo "All services healthy!"
                  exit 0
              fi
              sleep 5
          done
          echo "Services failed to become healthy in time"
          docker compose logs
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: visual-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: visual-tests
        run: npx playwright install --with-deps

      - name: Run visual and accessibility tests
        working-directory: visual-tests
        run: npm run test
        env:
          BASE_URL: http://localhost:8080/

      - name: Upload Test Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: visual-tests/playwright-report/
          retention-days: 7

      - name: Teardown application instance
        if: always()
        run: docker compose down -v

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            cd /app
            
            # Log in to GHCR securely
            echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull published images
            docker pull ghcr.io/${{ github.repository_owner }}/app-web:${{ env.DEPLOY_SHA }}
            docker pull ghcr.io/${{ github.repository_owner }}/app-modern:${{ env.DEPLOY_SHA }}
            
            # Tag locally for docker-compose
            docker tag ghcr.io/${{ github.repository_owner }}/app-web:${{ env.DEPLOY_SHA }} app-web:latest
            docker tag ghcr.io/${{ github.repository_owner }}/app-modern:${{ env.DEPLOY_SHA }} app-modern:latest
            
            # Execute zero-downtime deployment script
            bash ./deploy.sh
