server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica
spring.datasource.username=clinica
spring.datasource.password=clinica
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.store-type=none
spring.session.jdbc.initialize-schema=always

# Test overrides
server.port=8081
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.session.store-type=none
spring.session.jdbc.initialize-schema=always

# Dummy OAuth2 and SAML2 properties to allow Spring Security to initialize
spring.security.oauth2.client.registration.test.client-id=test
spring.security.oauth2.client.registration.test.client-secret=test
spring.security.oauth2.client.registration.test.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.test.authorization-uri=http://localhost:8080/auth
spring.security.oauth2.client.provider.test.token-uri=http://localhost:8080/token

spring.security.saml2.relyingparty.registration.test.entity-id=test
spring.security.saml2.relyingparty.registration.test.assertingparty.entity-id=test
spring.security.saml2.relyingparty.registration.test.assertingparty.single-sign-on.url=http://localhost:8080/sso
spring.security.saml2.relyingparty.registration.test.assertingparty.single-sign-on.sign-request=false
