server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica
spring.datasource.username=clinica
spring.datasource.password=clinica
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.store-type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.session.jdbc.initialize-schema=always
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true
management.health.ldap.enabled=false

# Administrative configuration parameter for decoupled reporting synchronization
reporting.sync.interval=10000

