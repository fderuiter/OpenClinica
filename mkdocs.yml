site_name: OpenClinica Documentation Portal
site_url: !ENV [SITE_URL, 'https://fderuiter.github.io/OpenClinica/']
theme:
  name: material
nav:
  - Home: index.md
  - Tutorials:
    - Build Study: tutorials/build_study.md
    - Participate Setup: tutorials/participate_setup.md
    - Randomize Setup: tutorials/randomize_setup.md
    - Tomcat Initialization: tutorials/tomcat.md
  - How-To Guides:
    - Import Data: how-to/import_data.md
    - Verify Import Rule: how-to/verify_import_rule.md
    - Test Rules: how-to/test_rules.md
    - Extract Selection Guide: how-to/extract_select_crf_and_group.md
    - Generate Dataset HTML: how-to/generate_dataset_html.md
    - Cookbook Index: how-to/cookbook_index.md
    - Subject Enrollment: how-to/cookbook_enrollment.md
    - Event Scheduling: how-to/cookbook_scheduling.md
    - Form Data Ingestion: how-to/cookbook_ingestion.md
    - Visual Testing Guide: how-to/visual_testing.md
  - Reference:
    - Rules XML Reference: reference/rules.md
    - React Components API: reference/frontend-api/modules.md
    - Interactive REST API: reference/api.md
    - SOAP API Documentation: reference/soap.md
    - Installation & Upgrade: reference/installation-upgrade.md
  - Explanation:
    - Project Information: explanation/project-info.md
    - Lifecycle Management: explanation/lifecycle_management.md
    - Safeguards and Rollbacks: explanation/configuration_safeguards_and_rollbacks.md
    - Staged Batch Persistence: explanation/staged_batch_persistence.md
    - Architecture Guide: explanation/architecture.md
hooks:
  - hooks/copy_external_specs.py
  - hooks/assign_categories.py
  - hooks/filter_restricted.py
  - hooks/absolute_redirects.py
plugins:
  - search
  - tags
  - redirects:
      redirect_maps:
        'frontend/architecture.md': 'explanation/architecture.md'
        'maintenance/staged_batch_persistence.md': 'explanation/staged_batch_persistence.md'
