version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica
      POSTGRES_PASSWORD: clinica
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - JAVA_OPTS=-Xmx1024m

volumes:
  db-data:
