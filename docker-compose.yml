version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica
      POSTGRES_PASSWORD: clinica
    ports:
    - 5432:5432
    volumes:
    - db-data:/var/lib/postgresql/data
  web:
    build: .
    ports:
    - 8080:8080
    depends_on:
    - db
    environment:
    - JAVA_OPTS=-Xmx1024m
    env_file:
    - .env
  modern:
    build:
      context: .
      target: modern
    ports:
    - 8081:8080
    depends_on:
    - db
    environment:
    - spring.datasource.url=jdbc:postgresql://db:5432/clinica
    - spring.datasource.username=clinica
    - spring.datasource.password=clinica
volumes:
  db-data: null
