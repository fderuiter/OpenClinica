version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGPORT: ${DB_PORT}
    ports:
    - ${DB_PORT}:${DB_PORT}
    volumes:
    - db-data:/var/lib/postgresql/data
  admin:
    image: postgres:15-alpine
    entrypoint: ["/utils/admin.sh"]
    depends_on:
    - db
    environment:
    - DB_HOST=${DB_HOST}
    - DB_PORT=${DB_PORT}
    - DB_USER=${DB_USER}
    - DB_PASS=${DB_PASS}
    - DB_NAME=${DB}
    - DB_SCHEMA=app_schema
    - BACKUP_FILE=/tmp/backup/db_backup.dump
    volumes:
    - backup-data:/tmp/backup
    - ./utils/admin.sh:/utils/admin.sh:ro
  web:
    image: app-web:${IMAGE_TAG:-latest}
    build: .
    ports:
    - 8080:8080
    depends_on:
    - db
    - redis
    environment:
    - JAVA_OPTS=-Xmx1024m
    - SPRING_QUARTZ_AUTO_STARTUP=false
    - LIQUIBASE_SHOULD_RUN=false
    - REDIS_HOST=redis
    env_file:
    - path: .env
      required: false
    volumes:
    - clinica-data:/opt/clinica/data
    - ${HOST_CLINICAL_TEMPLATE_PATH:-./dummy_template.xlsx}:/opt/clinica/template.xlsx:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
  modern:
    image: app-modern:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.modern
    ports:
    - 8081:8081
    depends_on:
    - db
    - redis
    environment:
    - spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB}
    - spring.datasource.username=${DB_USER}
    - spring.datasource.password=${DB_PASS}
    - SPRING_QUARTZ_AUTO_STARTUP=false
    - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics
    - LIQUIBASE_SHOULD_RUN=false
    - REDIS_HOST=redis
    volumes:
    - ${HOST_FILE_PATH:-./data}:/opt/clinica/data
    - ${HOST_CLINICAL_TEMPLATE_PATH:-./dummy_template.xlsx}:/opt/clinica/template.xlsx:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
  redis:
    image: redis:7-alpine
    ports:
    - 6379:6379
volumes:
  db-data:
  backup-data:
  clinica-data:
