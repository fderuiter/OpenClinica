version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGPORT: ${DB_PORT}
    ports:
    - ${DB_PORT}:${DB_PORT}
    volumes:
    - db-data:/var/lib/postgresql/data
  admin:
    image: postgres:15-alpine
    entrypoint: ["/admin.sh"]
    depends_on:
    - db
    environment:
    - DB_HOST=${DB_HOST}
    - DB_PORT=${DB_PORT}
    - DB_USER=${DB_USER}
    - DB_PASS=${DB_PASS}
    - DB_NAME=${DB}
    - DB_SCHEMA=app_schema
    - BACKUP_FILE=/tmp/backup/db_backup.dump
    volumes:
    - backup-data:/tmp/backup
    - ./admin.sh:/admin.sh:ro
  web:
    build: .
    ports:
    - 8080:8080
    depends_on:
    - db
    environment:
    - JAVA_OPTS=-Xmx1024m
    - SPRING_QUARTZ_AUTO_STARTUP=false
    env_file:
    - .env
    volumes:
    - ${HOST_FILE_PATH:-./data}:/opt/clinica/data
    - ${HOST_CLINICAL_TEMPLATE_PATH:-./dummy_template.xlsx}:/opt/clinica/template.xlsx:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  modern:
    build:
      context: .
      dockerfile: Dockerfile.modern
    ports:
    - 8081:8080
    depends_on:
    - db
    environment:
    - spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB}
    - spring.datasource.username=${DB_USER}
    - spring.datasource.password=${DB_PASS}
    - SPRING_QUARTZ_AUTO_STARTUP=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  db-data:
  backup-data:
